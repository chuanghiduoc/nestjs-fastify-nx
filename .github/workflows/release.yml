name: Release

on:
  push:
    tags:
      - 'v*.*.*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Production releases run sequentially per tag — concurrent runs against the
# same tag are nonsensical and would race on registry pushes.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prime-build-cache:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Build shared production stage
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile
          target: build-prod
          outputs: type=cacheonly
          cache-from: type=gha,scope=production-build
          cache-to: type=gha,mode=max,scope=production-build

  build-and-push:
    needs: prime-build-cache
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      packages: write
      # Required by docker/build-push-action when emitting provenance/SBOM
      # attestations alongside the image (provenance: mode=max).
      id-token: write
      # The Trivy gate below uploads its SARIF from this job.
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        # prime-build-cache compiled the shared workspace once; each matrix job
        # restores that stage and only installs its service-specific dependencies.
        include:
          - app: api
            dockerfile: Dockerfile
            target: api
          - app: worker
            dockerfile: Dockerfile
            target: worker
          - app: scheduler
            dockerfile: Dockerfile
            target: scheduler
          - app: migration
            dockerfile: Dockerfile
            target: migration

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up QEMU (for cross-arch base images)
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      - name: Log in to Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.app }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest
          # OCI image labels — registries, scanners, and supply-chain tooling
          # consume these. image.source/revision/created/version come from the
          # action; we add the human-facing fields per app.
          labels: |
            org.opencontainers.image.title=nestjs-fastify-nx-${{ matrix.app }}
            org.opencontainers.image.description=Production ${{ matrix.app }} image (${{ github.repository }} @ ${{ github.ref_name }})
            org.opencontainers.image.licenses=MIT
            org.opencontainers.image.vendor=nestjs-fastify-nx
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}/blob/main/docs/deployment.md

      # Local daemon only — nothing is published until Trivy passes below, so a vulnerable image
      # never reaches GHCR and never gets signed. Scanning after the push has nothing to retract.
      - name: Build image for scanning (${{ matrix.app }})
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: false
          load: true
          # linux/amd64 only by default — flip to `linux/amd64,linux/arm64`
          # if multi-arch is needed; QEMU is already available for that.
          # Note: `load` cannot carry multi-arch, so going multi-arch means scanning per platform.
          platforms: linux/amd64
          tags: scan-candidate/${{ matrix.app }}:${{ github.sha }}
          cache-from: |
            type=gha,scope=production-build
            type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

      - name: Trivy security scan (${{ matrix.app }})
        uses: aquasecurity/trivy-action@6c175e9c4083a92bbca2f9af4af0408e91440ef0
        with:
          image-ref: scan-candidate/${{ matrix.app }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.app }}.sarif
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      # always() so a failing gate still reports. The push step below has no such condition, so it
      # stays skipped when the scan fails.
      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: trivy-${{ matrix.app }}.sarif
          category: trivy-${{ matrix.app }}

      # Cache hit on the scan build's layers, not a rebuild — it re-exports through buildkit to
      # attach SBOM + provenance, which the local `load` exporter cannot produce.
      - name: Push Docker image (${{ matrix.app }})
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # SBOM + provenance: required for SLSA-3 attestations and any
          # supply-chain policy that pins on `cosign verify-attestation`.
          sbom: true
          provenance: mode=max
          cache-from: |
            type=gha,scope=production-build
            type=gha,scope=${{ matrix.app }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Keyless signing via Fulcio: identity is the workflow ref + actor, no
      # long-lived keys. Verifiers later assert against this identity using
      # `cosign verify --certificate-identity ...`.
      - name: Sign image (cosign keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.app }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

  static-analysis:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Semgrep static analysis
        run: ./scripts/security/scan-sast.sh

  # Release stops at signed, scanned images on GHCR. Migrating the database and
  # rolling out are deployment-specific (the target environment owns its DB
  # credentials and rollout mechanism), so they are intentionally not wired here
  # — pull the published image and run the migration + deploy from wherever you
  # deploy. See docs/deployment.md.
