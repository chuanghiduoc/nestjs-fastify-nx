# PR CI runs `nx affected`, which only re-checks projects touched by the diff — a
# pre-existing lint/type/boundary violation in an untouched project can sit red in
# the editor while PR checks stay green. This job runs the SAME checks across the
# WHOLE workspace on a nightly schedule and on every push to main, so drift in
# untouched code is caught without slowing down PRs.
name: full-check

on:
  schedule:
    - cron: '0 2 * * *' # 02:00 UTC daily
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: full-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  full-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6
        with:
          # Pinned to match package.json `packageManager` and the Dockerfiles.
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync check
        run: pnpm nx sync:check

      - name: Format check (all)
        run: pnpm nx format:check --all

      - name: Lint + typecheck ALL projects
        run: pnpm nx run-many -t lint typecheck --all --parallel=3
