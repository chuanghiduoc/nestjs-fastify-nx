name: Integration Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

concurrency:
  group: integration-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nestjs_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis-cache:
        image: redis:8-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s

      redis-queue:
        image: redis:8-alpine
        ports:
          - 6380:6380
        options: >-
          --health-cmd "redis-cli -p 6380 ping"
          --health-interval 10s
        command: redis-server --port 6380

      minio:
        image: minio/minio:RELEASE.2025-04-22T22-12-26Z
        ports:
          - 9000:9000
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
        options: >-
          --health-cmd "curl -f http://localhost:9000/minio/health/live"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        command: server /data

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nestjs_test_db
      REDIS_CACHE_HOST: localhost
      REDIS_CACHE_PORT: 6379
      REDIS_QUEUE_HOST: localhost
      REDIS_QUEUE_PORT: 6380
      # Better Auth replaces the legacy JWT setup; only one secret is needed.
      BETTER_AUTH_SECRET: integration-better-auth-secret-min-32-chars-long
      STORAGE_ENDPOINT: http://localhost:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
      STORAGE_BUCKET: uploads
      STORAGE_REGION: us-east-1

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          # Pinned to match package.json `packageManager` and the Dockerfiles.
          version: 10.33.0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Nx workspace
        run: pnpm nx sync

      - name: Run database migrations
        run: pnpm prisma migrate deploy

      - uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5

      - name: Integration tests
        # `integration` is a vitest positional filename filter (substring match). The
        # inferred @nx/vitest target runs vitest directly, which has no Jest-style
        # `--testPathPattern`. Only integration test files match; unit-only projects
        # match nothing and pass via `passWithNoTests`.
        run: pnpm nx affected --target=test --base=$NX_BASE --head=$NX_HEAD --parallel=1 -- integration

      - name: E2E tests
        run: pnpm nx affected --target=e2e --base=$NX_BASE --head=$NX_HEAD --parallel=1
