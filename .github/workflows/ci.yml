name: CI

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history so gitleaks scans every commit, not just PR HEAD.
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dep-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      # OSV-Scanner pulls advisories from osv.dev — wider feed than npm audit
      # (covers GitHub Security Advisories, GHSA, language ecosystems, OS pkgs).
      - name: OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --recursive
            --lockfile=./pnpm-lock.yaml

  # SAST on every PR, not just release tags — so dependency PRs (auto-merged by
  # dependabot once required checks pass) and code PRs are both scanned before
  # landing. Reuses the same Docker-pinned Semgrep script release.yml runs.
  sast:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Semgrep static analysis
        run: ./scripts/security/scan-sast.sh

  main:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      NX_CLOUD_AUTH_TOKEN: ${{ secrets.NX_CLOUD_AUTH_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          # Pinned to match package.json `packageManager` and the Dockerfiles.
          version: 11.14.0

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync Nx workspace
        run: pnpm nx sync:check

      # Must run before any `nx format:check`/`nx affected` so NX_BASE/NX_HEAD
      # are populated. Without this, nx falls back to `defaultBase: "main"`
      # which doesn't exist as a local ref in PR checkouts.
      - name: Set NX base and head
        uses: nrwl/nx-set-shas@afb73a62d26e41464e9254689e1fd6122ee683c1 # v5

      - name: Format check
        run: pnpm nx format:check --base=$NX_BASE --head=$NX_HEAD

      - name: Lint affected
        run: pnpm nx affected --target=lint --base=$NX_BASE --head=$NX_HEAD

      - name: Typecheck affected
        run: pnpm nx affected --target=typecheck --base=$NX_BASE --head=$NX_HEAD

      - name: Unit test affected
        run: pnpm nx affected --target=test --base=$NX_BASE --head=$NX_HEAD --exclude="*-e2e"

      - name: Build affected
        run: pnpm nx affected --target=build --base=$NX_BASE --head=$NX_HEAD

      # The generated API client is committed so IDEs and fresh clones resolve
      # `@nestjs-fastify-nx/api-client` without a codegen step. Regenerate it and
      # fail on drift, so a changed OpenAPI surface can't land without the client
      # being regenerated and committed.
      - name: Verify generated API client is up to date
        run: |
          pnpm codegen:full
          # `git status --porcelain` (not `git diff`) so a NEW tag file — which is
          # untracked, and thus invisible to `git diff` — also trips the check.
          if [ -n "$(git status --porcelain -- libs/api-client/src/generated)" ]; then
            echo "::error::api-client generated code is stale — run 'pnpm codegen:full' and commit libs/api-client/src/generated.";
            git status --porcelain -- libs/api-client/src/generated;
            exit 1;
          fi

  # `nx build` emits dist but never boots it, so runtime-only regressions slip
  # through every job above — an swc transpile target that breaks `class extends`,
  # a broken DI wiring, a missing runtime dep, a Dockerfile stage error. This job
  # builds the real multi-stage images and boots the full dev stack so those fail
  # here on the PR instead of at `release.yml` tag time. Supply-chain scanning
  # (Trivy/SBOM/Cosign) stays in release.yml — this gate is correctness only.
  docker-smoke:
    needs: main
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      COMPOSE_FILE: docker/compose.yml:docker/compose.dev.yml
      BUILDX_NO_DEFAULT_ATTESTATIONS: 1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4

      # compose.dev.yml overrides DB/Redis/S3/SMTP hosts to service names, so the
      # example's dev defaults are sufficient — no secrets needed for a smoke boot.
      - name: Seed .env from example
        run: |
          cp .env.example .env
          # Exercise the first-boot admin seed through the migration container.
          {
            echo "RUN_SEED=true"
            echo "SEED_ADMIN_EMAIL=admin@smoke.test"
            echo "SEED_ADMIN_PASSWORD=SmokeAdmin123!"
          } >> .env

      # depends_on chains every service (infra + migration + minio-init), so this
      # one command builds all four app images and boots the whole stack. --wait
      # blocks on worker/scheduler healthchecks and migration completing; a crash
      # loop or failed migration trips --wait-timeout and fails.
      - name: Build images and boot stack
        run: |
          docker compose --env-file .env up -d --build --wait --wait-timeout 300 \
            migration api worker scheduler

      - name: Smoke test — API liveness + readiness
        run: |
          for _ in $(seq 1 30); do
            curl -sf -m 2 http://127.0.0.1:3000/api/v1/health/live >/dev/null && break
            sleep 2
          done
          curl -sf -m 5 http://127.0.0.1:3000/api/v1/health/live >/dev/null \
            || { echo "API liveness failed within 60s"; exit 1; }
          # Readiness checks the core serving deps (DB primary + Redis cache + Redis queue) —
          # proves the API can reach them, not just that the process is up.
          curl -sf -m 5 http://127.0.0.1:3000/api/v1/health/ready >/dev/null \
            || { echo "API readiness failed — core deps unreachable from api"; exit 1; }
          echo "API live + ready"

      # migration is a one-shot (prisma migrate deploy then exit); it won't appear
      # in `ps -q`, so query stopped containers and assert a clean exit.
      - name: Assert migration completed + admin seeded
        run: |
          cid=$(docker compose --env-file .env ps -aq migration)
          [ -n "$cid" ] || { echo "migration container not found"; exit 1; }
          status=$(docker inspect -f '{{.State.Status}}' "$cid")
          code=$(docker inspect -f '{{.State.ExitCode}}' "$cid")
          echo "migration: status=$status exit=$code"
          { [ "$status" = "exited" ] && [ "$code" -eq 0 ]; } \
            || { echo "migration did not complete cleanly"; exit 1; }
          # RUN_SEED=true, so the bootstrap admin row must exist (peer auth inside the container).
          admins=$(docker compose --env-file .env exec -T postgres \
            psql -U postgres -d nestjs_db -tAc \
            "SELECT count(*) FROM users WHERE email='admin@smoke.test' AND role='ADMIN'")
          echo "seeded admin rows: ${admins}"
          [ "${admins}" = "1" ] || { echo "admin seed row missing — seed path broken"; exit 1; }

      - name: Assert services are not crash-looping
        run: |
          fail=0
          for svc in api worker scheduler; do
            cid=$(docker compose --env-file .env ps -q "$svc")
            status=$(docker inspect -f '{{.State.Status}}' "$cid")
            restarts=$(docker inspect -f '{{.RestartCount}}' "$cid")
            echo "$svc: status=$status restarts=$restarts"
            { [ "$status" = "running" ] && [ "$restarts" -le 1 ]; } || fail=1
          done
          exit $fail

      - name: Worker functional — welcome email delivered via mailpit
        run: |
          email="worker-smoke-$(date +%s)@smoke.test"
          curl -sf -m 10 -X POST http://127.0.0.1:3000/api/auth/sign-up/email \
            -H 'content-type: application/json' \
            -d "{\"email\":\"${email}\",\"password\":\"password123\",\"name\":\"WorkerSmoke\"}" >/dev/null \
            || { echo "sign-up failed"; exit 1; }
          # sign-up → users.registered outbox trigger → relay → BullMQ → worker → SMTP → mailpit.
          for _ in $(seq 1 30); do
            total=$(curl -sf -m 5 http://127.0.0.1:8025/api/v1/messages | jq -r '.total // 0')
            echo "mailpit messages: ${total}"
            [ "${total}" -ge 1 ] && { echo "worker consumed job → email delivered"; exit 0; }
            sleep 2
          done
          echo "no welcome email in mailpit within 60s — worker/outbox chain broken"; exit 1

      - name: Scheduler functional — heartbeat cron + startup
        run: |
          cid=$(docker compose --env-file .env ps -q scheduler)
          health=$(docker inspect -f '{{.State.Health.Status}}' "$cid")
          echo "scheduler health: ${health}"
          # 'healthy' requires the heartbeat cron to have refreshed /tmp/scheduler-alive within 60s.
          [ "${health}" = "healthy" ] || { echo "scheduler heartbeat cron not firing"; exit 1; }
          docker compose --env-file .env logs scheduler | grep -q "cron jobs are active" \
            || { echo "scheduler did not report cron startup"; exit 1; }
          echo "scheduler cron active + heartbeat healthy"

      # Functional coverage the boot checks can't give: auth recovery/self-service, Bull Board,
      # GraphQL and WebSocket, driven against the live Dockerised stack. Aggregates failures and
      # exits non-zero, so a broken endpoint fails the job.
      - name: Expanded functional smoke (auth, GraphQL, WebSocket, Bull Board)
        run: bash scripts/smoke-expanded.sh

      - name: Dump logs on failure
        if: ${{ failure() }}
        run: docker compose --env-file .env logs --tail=200 --no-color

      - name: Teardown
        if: ${{ always() }}
        run: docker compose --env-file .env down -v --remove-orphans
