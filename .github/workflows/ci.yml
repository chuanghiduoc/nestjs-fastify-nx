name: CI

on:
  pull_request:
    branches: [main, master, develop]
  push:
    branches: [main, master]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NX_CLOUD_AUTH_TOKEN: ${{ secrets.NX_CLOUD_AUTH_TOKEN }}

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history so gitleaks scans every commit, not just PR HEAD.
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dep-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      # OSV-Scanner pulls advisories from osv.dev — wider feed than npm audit
      # (covers GitHub Security Advisories, GHSA, language ecosystems, OS pkgs).
      - name: OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.0.2
        with:
          scan-args: |-
            --recursive
            --lockfile=./pnpm-lock.yaml

  main:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          # Pinned to match package.json `packageManager` and the Dockerfiles.
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `--prod` so dev tooling CVEs don't gate PRs; runtime advisories block.
      - name: Dependency vulnerability scan
        run: pnpm audit --prod --audit-level=high

      - name: Sync Nx workspace
        run: pnpm nx sync:check

      - name: Format check
        run: pnpm nx format:check

      - name: Set NX base and head for affected
        uses: nrwl/nx-set-shas@v4

      - name: Lint affected
        run: pnpm nx affected --target=lint --base=$NX_BASE --head=$NX_HEAD --parallel=3

      - name: Typecheck affected
        run: pnpm nx affected --target=typecheck --base=$NX_BASE --head=$NX_HEAD --parallel=3

      - name: Unit test affected
        run: pnpm nx affected --target=test --base=$NX_BASE --head=$NX_HEAD --parallel=3 --exclude="*-e2e"

      - name: Build affected
        run: pnpm nx affected --target=build --base=$NX_BASE --head=$NX_HEAD --parallel=3
