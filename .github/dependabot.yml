version: 2

# Weekly batched updates. Catch-all groups gather every dependency into a
# single PR per ecosystem so reviewers see one batch per Monday rather than
# a flurry of individual bumps. Major upgrades stay separate (excluded from
# catch-alls) so they get explicit review.
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 5
    versioning-strategy: increase
    labels: [dependencies, npm]
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)
      include: scope
    # webpack-cli major bumps depend on @nx/webpack catching up — pin to 5.x
    # until Nx ships compatibility with webpack-cli 6+ (the `--node-env` flag
    # was removed in v6).
    ignore:
      - dependency-name: webpack-cli
        update-types: [version-update:semver-major]
      # graphql 17 breaks the mercurius stack — mercurius@16 peers `graphql ^16`
      # and @nestjs/graphql peers `graphql ^16.11`. Hold at 16.x until the
      # Mercurius/@nestjs GraphQL packages ship graphql 17 support.
      - dependency-name: graphql
        update-types: [version-update:semver-major]
      # orval 8.20.0 ships an ESM config bundle that does `import yaml from
      # "js-yaml"`, but js-yaml's `.mjs` build exports named-only (no default),
      # so `pnpm codegen` crashes. Pin the exact broken release — a future
      # patched orval (8.20.1+) will be proposed again.
      - dependency-name: orval
        versions: ['8.20.0']
    groups:
      production-dependencies:
        dependency-type: production
        update-types: [minor, patch]
      development-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      production-major:
        dependency-type: production
        update-types: [major]
      development-major:
        dependency-type: development
        update-types: [major]

  - package-ecosystem: docker
    directories:
      - /apps/api
      - /apps/worker
      - /apps/scheduler
      - /apps/migration
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 2
    labels: [dependencies, docker]
    commit-message:
      prefix: chore(docker)
      include: scope
    groups:
      docker-images:
        patterns: ['*']
        update-types: [minor, patch]
      docker-images-major:
        patterns: ['*']
        update-types: [major]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Asia/Ho_Chi_Minh
    open-pull-requests-limit: 2
    labels: [dependencies, github-actions]
    commit-message:
      prefix: chore(ci)
      include: scope
    groups:
      github-actions:
        patterns: ['*']
        update-types: [minor, patch]
      github-actions-major:
        patterns: ['*']
        update-types: [major]
