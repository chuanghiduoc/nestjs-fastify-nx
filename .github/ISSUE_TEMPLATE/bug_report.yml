name: Bug report
description: Report a reproducible bug
title: 'bug: '
labels: [bug, triage]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill out the
        sections below so we can reproduce and fix the issue quickly.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reproduce the bug. A repo link is ideal.
      placeholder: |
        1. Run `pnpm nx serve api`
        2. Call `POST /api/v1/...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include logs / error messages where possible.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `git rev-parse HEAD` or release tag.
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Affected app / lib
      multiple: true
      options:
        - apps/api
        - apps/worker
        - apps/scheduler
        - apps/migration
        - libs/infra/*
        - libs/modules/*
        - libs/core/*
        - libs/shared
        - libs/contracts
        - tools/generators
        - docker / compose
        - CI / GitHub Actions
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, pnpm version, Docker version (if relevant).
      placeholder: |
        - OS: macOS 15.4
        - Node: 22.11.0
        - pnpm: 11.14.0
        - Docker: 27.5.1
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that helps — screenshots, configs, related issues.
