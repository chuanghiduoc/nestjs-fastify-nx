global
  log stdout format raw daemon

defaults
  mode tcp
  timeout client 30s
  timeout server 30s
  timeout connect 5s
  log global
  option tcplog

frontend pg_in
  bind *:6432
  default_backend pgbouncers

backend pgbouncers
  mode tcp
  balance leastconn
  # pgsql-aware healthcheck — issues an authentication probe against
  # healthcheck_user. Falls back to TCP-only if the role is absent, but the
  # role is strongly recommended (see examples/pgbouncer-ha/README.md).
  # rise=2: two consecutive successes before marking a backend UP.
  # fall=3: three consecutive failures before marking it DOWN.
  # inter=2s: probe interval → failover detected within 4-6 s.
  option pgsql-check user healthcheck_user
  server pgb1 pgbouncer-1:6432 check inter 2s rise 2 fall 3
  server pgb2 pgbouncer-2:6432 check inter 2s rise 2 fall 3
