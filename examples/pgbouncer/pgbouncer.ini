[databases]
; Primary database — all write and transactional read traffic.
nestjs_db = host=postgres port=5432 dbname=nestjs_db

; Read alias — wired to the same primary by default. Repoint this `host=`
; to a hot standby (e.g. postgres-replica:5432) once a replica is provisioned;
; the app's `DATABASE_REPLICA_URL` then targets `nestjs_db_read` to route
; read traffic through the same pooler.
nestjs_db_read = host=postgres port=5432 dbname=nestjs_db

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; SCRAM-SHA-256 requires PgBouncer >= 1.21. This config pins 1.23.1 via the
; edoburu/pgbouncer image — do not downgrade without updating auth_type.
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt

; Transaction mode: each server connection is returned to the pool after
; every statement, maximising connection reuse. Prisma with @prisma/adapter-pg
; and prepared-statement caching is compatible with transaction mode in
; PgBouncer >= 1.21 via max_prepared_statements.
;
; INCOMPATIBLE with: pg_advisory_lock, LISTEN/NOTIFY, SET LOCAL (session state).
; If you need advisory locks, switch pool_mode to session for those specific
; queries or use a separate connection string that bypasses pgbouncer.
pool_mode = transaction

; Client-side connection cap. 500 is the default; tune to (max_client_conn ≤
; sum of max_connections across all Postgres instances serving this pgbouncer).
max_client_conn = 500

; Server-side connections opened to Postgres. Budget:
;   (API_REPLICAS + 1 scheduler) × DATABASE_POOL_MAX ≤ default_pool_size + reserve_pool_size
; Default 30 + 5 = 35 covers up to 7 api replicas × pool_max=5 or 3 replicas × pool_max=11.
; Raise default_pool_size before raising DATABASE_POOL_MAX to keep total server
; connections below Postgres max_connections (typically 100 on a default install).
default_pool_size = 30
reserve_pool_size = 5
reserve_pool_timeout = 3

; Prisma prepared-statement cache. Must be set in transaction mode to avoid
; "prepared statement does not exist" errors on consecutive requests that land
; on different server connections. Requires PgBouncer >= 1.21.
max_prepared_statements = 200

; Idle transaction eviction — prevents long-held implicit transactions from
; holding a server connection indefinitely. 30s is generous; the outbox relay
; uses interactive transactions with a 30s budget (OUTBOX_TX_TIMEOUT_MS).
idle_transaction_timeout = 30

; Server connection recycling — return idle server connections to Postgres after
; 10 minutes to avoid hitting server-side idle timeouts.
server_idle_timeout = 600

; Structured admin access (optional — remove in production if not needed).
; admin_users = pgbouncer_admin
