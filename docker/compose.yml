# Project name comes from COMPOSE_PROJECT_NAME (.env) — `name:` at top-level
# is rejected by `docker stack deploy`'s older parser.

services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-nestjs_db}
      TZ: ${TZ:-UTC}
      PGTZ: ${TZ:-UTC}
    volumes:
      # Mount at the parent — Postgres 18+ official image recommends this layout
      # so `pg_upgrade --link` works across major-version bumps.
      - postgres_data:/var/lib/postgresql
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:8-alpine
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - '${REDIS_CACHE_PORT:-6379}:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  redis-queue:
    image: redis:8-alpine
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - '${REDIS_QUEUE_PORT:-6380}:6380'
    command: redis-server --port 6380
    healthcheck:
      test: ['CMD', 'redis-cli', '-p', '6380', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-05-24T17-08-30Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      TZ: ${TZ:-UTC}
    volumes:
      - minio_data:/data
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/ready']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Mailpit (fake SMTP) is defined in compose.dev.yml only.

  migration:
    restart: on-failure
    environment:
      TZ: ${TZ:-UTC}
    # Short-form list — long-form `condition:` is rejected by `docker stack
    # deploy`. compose.dev.yml layers the long-form variant for dev waits.
    depends_on:
      - postgres

  worker:
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      # Self-identify in logs/metrics/traces. Without this the worker inherits the
      # shared .env OTEL_SERVICE_NAME (nestjs-fastify-api) and mislabels itself as the API.
      OTEL_SERVICE_NAME: nestjs-fastify-worker
    healthcheck:
      test:
        [
          'CMD',
          'sh',
          '-c',
          'test -f /tmp/worker-alive && [ $$(( $$(date +%s) - $$(date -r /tmp/worker-alive +%s) )) -lt 60 ]',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  scheduler:
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
      # Self-identify in logs/metrics/traces (see worker note above).
      OTEL_SERVICE_NAME: nestjs-fastify-scheduler
    healthcheck:
      test:
        [
          'CMD',
          'sh',
          '-c',
          'test -f /tmp/scheduler-alive && [ $$(( $$(date +%s) - $$(date -r /tmp/scheduler-alive +%s) )) -lt 60 ]',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  minio_data:
