receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  # First in every pipeline — sheds data before the collector OOMs under a
  # traffic spike instead of being OOM-killed and losing everything.
  memory_limiter:
    check_interval: 1s
    # Paired with compose's 512 MiB container limit. Absolute limits behave consistently on
    # Docker Desktop, CI, and large production hosts.
    limit_mib: 400
    spike_limit_mib: 100

  # Tail sampling decides AFTER seeing a whole trace, so it can keep every error
  # and slow trace while sampling the rest. Every trace must reach this processor first:
  # keep OTEL_TRACES_SAMPLER_RATIO=1, because tail sampling cannot recover a trace that
  # the application already discarded at the head.
  #
  # NOTE: tail sampling needs all spans of a trace to reach the SAME collector. For a
  # horizontally scaled collector, put a trace-id-aware loadbalancing exporter in front
  # (a two-tier collector layout). Single-instance here, so no fan-in needed.
  tail_sampling:
    decision_wait: 10s
    num_traces: 50000
    expected_new_traces_per_sec: 1000
    policies:
      - name: errors
        type: status_code
        status_code:
          status_codes: [ERROR]
      - name: slow
        type: latency
        latency:
          threshold_ms: 1000
      - name: baseline
        type: probabilistic
        probabilistic:
          sampling_percentage: 5

  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  # Forward traces to Jaeger via OTLP gRPC.
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # Expose metrics in Prometheus scrape format so prometheus can pull them.
  prometheus:
    endpoint: 0.0.0.0:8889
    namespace: otelcol

service:
  telemetry:
    metrics:
      # Collector defaults this listener to localhost, which is unreachable from Prometheus in a
      # sibling container. Expose it only on the Compose network; host binding remains 127.0.0.1.
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
                without_type_suffix: true
                without_units: true
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, tail_sampling, batch]
      exporters: [otlp/jaeger]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
