global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Alert rules are version-controlled and evaluated on every scrape. They surface in the
# Prometheus UI (Alerts tab / ALERTS series) out of the box. Wire an Alertmanager under
# `alerting:` to route them to Slack/PagerDuty in a real deployment.
rule_files:
  - alert_rules.yml

scrape_configs:
  # Scrape Prometheus itself.
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Scrape the NestJS API metrics endpoint.
  # ENABLE_METRICS=true + METRICS_ALLOW_CIDRS must permit the prometheus container CIDR.
  - job_name: nestjs-api
    static_configs:
      - targets: ['api:3000']
    metrics_path: /metrics
    scheme: http

  # Scrape OpenTelemetry Collector's own Prometheus metrics.
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']
