global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Scrape Prometheus itself.
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  # Scrape the NestJS API metrics endpoint.
  # ENABLE_METRICS=true + METRICS_ALLOW_CIDRS must permit the prometheus container CIDR.
  - job_name: nestjs-api
    static_configs:
      - targets: ['api:3000']
    metrics_path: /metrics
    scheme: http

  # Scrape OpenTelemetry Collector's own Prometheus metrics.
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']
