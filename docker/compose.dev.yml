services:
  migration:
    build:
      context: ..
      dockerfile: apps/migration/Dockerfile
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nestjs_db

  api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: api-dev
    ports:
      - '3000:3000'
      - '9229:9229'
    env_file: ../.env
    environment:
      NODE_ENV: development
      TZ: ${TZ:-UTC}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nestjs_db
      REDIS_CACHE_HOST: redis-cache
      REDIS_QUEUE_HOST: redis-queue
      REDIS_QUEUE_PORT: '6380'
      STORAGE_ENDPOINT: http://minio:9000
      MAIL_HOST: mailpit
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
      target: worker-dev
    env_file: ../.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nestjs_db
      REDIS_CACHE_HOST: redis-cache
      REDIS_QUEUE_HOST: redis-queue
      REDIS_QUEUE_PORT: '6380'
      STORAGE_ENDPOINT: http://minio:9000
      MAIL_HOST: mailpit
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      redis-queue:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'sh',
          '-c',
          'test -f /tmp/worker-alive && [ $(( $(date +%s) - $(date -r /tmp/worker-alive +%s) )) -lt 60 ]',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  scheduler:
    build:
      context: ..
      dockerfile: Dockerfile
      target: scheduler-dev
    env_file: ../.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nestjs_db
      REDIS_CACHE_HOST: redis-cache
      REDIS_QUEUE_HOST: redis-queue
      REDIS_QUEUE_PORT: '6380'
      STORAGE_ENDPOINT: http://minio:9000
      MAIL_HOST: mailpit
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'sh',
          '-c',
          'test -f /tmp/scheduler-alive && [ $(( $(date +%s) - $(date -r /tmp/scheduler-alive +%s) )) -lt 60 ]',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
