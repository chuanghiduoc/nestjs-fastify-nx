services:
  # One-shot: creates the STORAGE_BUCKET and its orphan-expiry lifecycle rule if
  # absent. Runs after minio is healthy; restarts on failure until mc connects.
  minio-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    restart: 'no'
    depends_on:
      minio:
        condition: service_healthy
    env_file: ../.env
    entrypoint: >
      /bin/sh -c "
        set -eu;
        case "$$MINIO_ORPHAN_EXPIRY_DAYS" in ''|*[!0-9]*|0) echo 'minio-init: MINIO_ORPHAN_EXPIRY_DAYS must be a positive integer'; exit 1;; esac;
        connected=0;
        for i in $$(seq 1 15); do
          if mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\"; then connected=1; break; fi;
          echo 'waiting for minio... attempt '$$i; sleep 2;
        done;
        [ "$$connected" = 1 ] || { echo 'minio-init: cannot reach minio after 30s'; exit 1; };
        mc mb --ignore-existing \"local/$$STORAGE_BUCKET\";
        mc ilm rule remove --all --force \"local/$$STORAGE_BUCKET\" 2>/dev/null || true;
        mc ilm rule add --expire-days "$$MINIO_ORPHAN_EXPIRY_DAYS" --tags 'committed=false' \"local/$$STORAGE_BUCKET\";
        echo 'bucket ready: '$$STORAGE_BUCKET
      "

  migration:
    build:
      context: ..
      dockerfile: Dockerfile
      target: migration-dev
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nestjs_db

  # Fake SMTP for dev/CI mail testing — UI at http://localhost:8025.
  # Prod deployments terminate at real SMTP via MAIL_HOST in .env.
  mailpit:
    image: axllent/mailpit:v1.30.4
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - '${MAIL_PORT:-1025}:1025'
      - '${MAILPIT_UI_PORT:-8025}:8025'

  api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: api-dev
    ports:
      - '${API_PORT:-3000}:${PORT:-3000}'
      - '${API_DEBUG_PORT:-9229}:9229'
    env_file: ../.env
    environment:
      NODE_ENV: development
      LOG_PRETTY: 'false'
      TZ: ${TZ:-UTC}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nestjs_db
      REDIS_CACHE_HOST: redis-cache
      # In-network port. Unpinned it falls through to env_file, where the value is the HOST
      # publish port — repointing that to dodge a clash would then break the cache connection.
      REDIS_CACHE_PORT: '6379'
      REDIS_QUEUE_HOST: redis-queue
      REDIS_QUEUE_PORT: '6380'
      STORAGE_ENDPOINT: http://minio:9000
      # Presigned upload/download URLs are signed against the host-reachable
      # address so a browser outside the compose network can resolve them.
      STORAGE_PUBLIC_ENDPOINT: http://localhost:9000
      MAIL_HOST: mailpit
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
      target: worker-dev
    env_file: ../.env
    environment:
      NODE_ENV: development
      LOG_PRETTY: 'false'
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nestjs_db
      REDIS_CACHE_HOST: redis-cache
      # In-network port. Unpinned it falls through to env_file, where the value is the HOST
      # publish port — repointing that to dodge a clash would then break the cache connection.
      REDIS_CACHE_PORT: '6379'
      REDIS_QUEUE_HOST: redis-queue
      REDIS_QUEUE_PORT: '6380'
      STORAGE_ENDPOINT: http://minio:9000
      MAIL_HOST: mailpit
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'sh',
          '-c',
          'test -f /tmp/worker-alive && [ $$(( $$(date +%s) - $$(date -r /tmp/worker-alive +%s) )) -lt 60 ]',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  scheduler:
    build:
      context: ..
      dockerfile: Dockerfile
      target: scheduler-dev
    env_file: ../.env
    environment:
      NODE_ENV: development
      LOG_PRETTY: 'false'
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nestjs_db
      REDIS_CACHE_HOST: redis-cache
      # In-network port. Unpinned it falls through to env_file, where the value is the HOST
      # publish port — repointing that to dodge a clash would then break the cache connection.
      REDIS_CACHE_PORT: '6379'
      REDIS_QUEUE_HOST: redis-queue
      REDIS_QUEUE_PORT: '6380'
      STORAGE_ENDPOINT: http://minio:9000
      MAIL_HOST: mailpit
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'sh',
          '-c',
          'test -f /tmp/scheduler-alive && [ $$(( $$(date +%s) - $$(date -r /tmp/scheduler-alive +%s) )) -lt 60 ]',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
