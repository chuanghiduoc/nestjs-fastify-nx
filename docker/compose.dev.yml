services:
  # One-shot: creates the STORAGE_BUCKET if it does not already exist.
  # Runs after minio is healthy; restarts on failure until mc alias connects.
  minio-init:
    image: minio/mc:RELEASE.2025-05-21T01-59-54Z
    restart: 'no'
    depends_on:
      minio:
        condition: service_healthy
    env_file: ../.env
    entrypoint: >
      /bin/sh -c "
        for i in $$(seq 1 15); do
          mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD && break;
          echo 'waiting for minio... attempt '$$i; sleep 2;
        done;
        mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD || { echo 'minio-init: cannot reach minio after 30s'; exit 1; };
        mc mb -p local/$$STORAGE_BUCKET;
        echo 'bucket ready: '$$STORAGE_BUCKET
      "

  migration:
    build:
      context: ..
      dockerfile: Dockerfile
      target: migration
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nestjs_db

  # Fake SMTP for dev/CI mail testing — UI at http://localhost:8025.
  # Prod deployments terminate at real SMTP via MAIL_HOST in .env.
  mailpit:
    image: axllent/mailpit:v1.27.11
    restart: unless-stopped
    environment:
      TZ: ${TZ:-UTC}
    ports:
      - '${MAIL_PORT:-1025}:1025'
      - '${MAILPIT_UI_PORT:-8025}:8025'
    healthcheck:
      test: ['CMD', '/mailpit', '--help']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: api-dev
    ports:
      - '${API_PORT:-3000}:3000'
      - '${API_DEBUG_PORT:-9229}:9229'
    env_file: ../.env
    environment:
      NODE_ENV: development
      TZ: ${TZ:-UTC}
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nestjs_db
      REDIS_CACHE_HOST: redis-cache
      REDIS_QUEUE_HOST: redis-queue
      REDIS_QUEUE_PORT: '6380'
      STORAGE_ENDPOINT: http://minio:9000
      MAIL_HOST: mailpit
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: Dockerfile
      target: worker-dev
    env_file: ../.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nestjs_db
      REDIS_CACHE_HOST: redis-cache
      REDIS_QUEUE_HOST: redis-queue
      REDIS_QUEUE_PORT: '6380'
      STORAGE_ENDPOINT: http://minio:9000
      MAIL_HOST: mailpit
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'sh',
          '-c',
          'test -f /tmp/worker-alive && [ $$(( $$(date +%s) - $$(date -r /tmp/worker-alive +%s) )) -lt 60 ]',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  scheduler:
    build:
      context: ..
      dockerfile: Dockerfile
      target: scheduler-dev
    env_file: ../.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nestjs_db
      REDIS_CACHE_HOST: redis-cache
      REDIS_QUEUE_HOST: redis-queue
      REDIS_QUEUE_PORT: '6380'
      STORAGE_ENDPOINT: http://minio:9000
      MAIL_HOST: mailpit
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          'CMD',
          'sh',
          '-c',
          'test -f /tmp/scheduler-alive && [ $$(( $$(date +%s) - $$(date -r /tmp/scheduler-alive +%s) )) -lt 60 ]',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
