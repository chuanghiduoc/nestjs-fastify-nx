# Local-test overlay for prod-parity verification in single-node Swarm.
# DO NOT use in any real deployment — `environment:` overrides the dev `.env`
# insecure defaults that the production validator rejects (minioadmin,
# BULL_BOARD_PASSWORD=admin, MAIL_HOST=localhost, ...). Driven by
# scripts/swarm-local-test.sh.

services:
  api:
    environment:
      NODE_ENV: production
      STORAGE_ACCESS_KEY: localtest-access-key
      STORAGE_SECRET_KEY: localtest-secret-key-min-16
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: uploads
      BULL_BOARD_PASSWORD: localtest-bullboard-pwd
      BULL_BOARD_USERNAME: admin
      MAIL_HOST: smtp.localtest.local
      MAIL_DEFAULT_EMAIL: test@localtest.local
      BETTER_AUTH_URL: http://localhost:3000
      BETTER_AUTH_SECRET: localtest-better-auth-secret-min-32-chars
      FRONTEND_BASE_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000

  worker:
    environment:
      NODE_ENV: production
      STORAGE_ACCESS_KEY: localtest-access-key
      STORAGE_SECRET_KEY: localtest-secret-key-min-16
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: uploads
      MAIL_HOST: smtp.localtest.local
      MAIL_DEFAULT_EMAIL: test@localtest.local

  scheduler:
    environment:
      NODE_ENV: production
      STORAGE_ACCESS_KEY: localtest-access-key
      STORAGE_SECRET_KEY: localtest-secret-key-min-16
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: uploads
      BULL_BOARD_PASSWORD: localtest-bullboard-pwd
      MAIL_HOST: smtp.localtest.local
      MAIL_DEFAULT_EMAIL: test@localtest.local
