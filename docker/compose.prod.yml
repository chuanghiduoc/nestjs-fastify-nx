# Production overlay — compose with the base `compose.yml` to deploy released
# images:
#
#   docker compose -f docker/compose.yml -f docker/compose.prod.yml up -d
#
# Image references resolve against `${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/<app>:${IMAGE_TAG}`,
# matching what `release.yml` publishes to GHCR. Operators set those vars in
# `.env` (or the deploy environment) — `IMAGE_TAG=latest` works for rolling
# deploys, `IMAGE_TAG=1.2.3` pins a specific release.
#
# This file deliberately omits `build:` so a thin host (no source checkout)
# can pull and run from the registry alone.
#
# Note: the base compose.yml publishes postgres/redis/minio host ports for dev
# convenience (short-form mappings bind 0.0.0.0 — reachable from the internet on
# a host with a public IP). This prod overlay strips those bindings via
# `ports: !override []` so the data tier is reachable only over the internal
# compose network (apps connect by service name: postgres:5432, redis-cache:6379,
# redis-queue:6380). Only the api port is published. Host firewall rules remain a
# sensible defense-in-depth layer, but are no longer the sole protection.

# x-anchors are reused across api/worker/scheduler so policy stays in one place.
x-app-security: &app-security
  read_only: true
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  tmpfs:
    # /tmp is read-only otherwise; worker/scheduler write liveness probes here,
    # api uses it for fastify multipart upload spool. noexec/nosuid blocks
    # arbitrary execution if an attacker writes a binary into the writable mount.
    - /tmp:rw,noexec,nosuid,size=64m
  ulimits:
    nofile:
      soft: 65536
      hard: 65536

x-app-logging: &app-logging
  logging:
    driver: json-file
    options:
      max-size: '50m'
      max-file: '5'
      labels: 'service'

services:
  # docker-network hostnames (postgres / redis-cache / redis-queue) are
  # determined by compose itself, so we hardcode them here regardless of
  # what `.env` carries — operators only need to set credentials, not topology.
  # MAIL_HOST and STORAGE_ENDPOINT are intentionally NOT overridden: prod
  # deployments terminate at real SMTP / real S3 endpoints supplied via .env.

  postgres:
    <<: *app-logging
    # Strip the host-port mapping inherited from compose.yml — the data tier
    # talks to apps over the internal compose network only.
    ports: !override []
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
        reservations:
          memory: 256M
          cpus: '0.25'

  redis-cache:
    <<: *app-logging
    ports: !override []
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  redis-queue:
    <<: *app-logging
    ports: !override []
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  minio:
    <<: *app-logging
    ports: !override []

  # Migration intentionally skips read_only because pnpm + prisma migrate write
  # transient files outside /tmp during migration apply. Other hardening still applies.
  migration:
    <<: *app-logging
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE}/migration:${IMAGE_TAG:-latest}
    env_file: ../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-nestjs_db}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

  api:
    <<: [*app-security, *app-logging]
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE}/api:${IMAGE_TAG:-latest}
    env_file: ../.env
    environment:
      NODE_ENV: production
      TZ: ${TZ:-UTC}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-nestjs_db}
      REDIS_CACHE_HOST: redis-cache
      REDIS_QUEUE_HOST: redis-queue
      REDIS_QUEUE_PORT: '6380'
    # Loopback by default — not internet-facing. Set API_BIND_HOST=0.0.0.0 for
    # direct exposure, but Docker's port publishing BYPASSES ufw/firewalld; gate
    # it with a cloud security group or a DOCKER-USER rule, not the host firewall.
    ports:
      - '${API_BIND_HOST:-127.0.0.1}:${API_PORT:-3000}:${PORT:-3000}'
    # Long-form gates plain-compose deploys on migration completion + dependency
    # health so the api doesn't crash-loop on a fresh DB. compose.swarm.yml
    # overrides back to short-form because `docker stack deploy` rejects the
    # `condition:` key (apps retry DB/Redis connections at boot regardless).
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    restart: unless-stopped
    # Liveness probe — process is alive. Use /health/ready for K8s readiness;
    # /health (full) for ops dashboards. Docker should only kill on liveness fail.
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--quiet',
          '--spider',
          '--tries=1',
          'http://127.0.0.1:${PORT:-3000}/api/v1/health/live',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    stop_grace_period: 30s
    deploy:
      replicas: ${API_REPLICAS:-1}
      update_config:
        parallelism: 1
        order: start-first
        delay: 10s
        monitor: 30s
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  worker:
    <<: [*app-security, *app-logging]
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE}/worker:${IMAGE_TAG:-latest}
    env_file: ../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-nestjs_db}
      REDIS_CACHE_HOST: redis-cache
      REDIS_QUEUE_HOST: redis-queue
      REDIS_QUEUE_PORT: '6380'
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      redis-queue:
        condition: service_healthy
    restart: unless-stopped
    # stop_grace_period must exceed worst-case BullMQ job timeout + lock duration
    # so in-flight jobs complete before SIGKILL. Email + S3 HEAD jobs are
    # sub-second; 45s gives a comfortable buffer. Bump if longer-running handlers
    # are introduced.
    stop_grace_period: 45s
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
      update_config:
        parallelism: 1
        order: start-first
        delay: 10s
        monitor: 30s
        failure_action: rollback
      rollback_config:
        parallelism: 1
        order: stop-first
      resources:
        limits:
          memory: 1G
          cpus: '2.0'
        reservations:
          memory: 256M
          cpus: '0.5'

  scheduler:
    <<: [*app-security, *app-logging]
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE}/scheduler:${IMAGE_TAG:-latest}
    env_file: ../.env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-nestjs_db}
      REDIS_CACHE_HOST: redis-cache
      REDIS_QUEUE_HOST: redis-queue
      REDIS_QUEUE_PORT: '6380'
    # Scheduler MUST run as a single replica — multiple instances duplicate
    # cron firings. Enforced via deploy.replicas for swarm; under plain
    # compose, never run `--scale scheduler=N` with N>1.
    # stop-first update order: old scheduler stops before new one starts.
    # A brief cron gap is acceptable; a double-fire window (start-first) is not.
    # 30s grace period: VACUUM and partition DDL jobs can run up to ~20s;
    # the Docker default of 10s would SIGKILL them mid-operation.
    stop_grace_period: 30s
    deploy:
      replicas: 1
      update_config:
        order: stop-first
        parallelism: 1
      placement:
        max_replicas_per_node: 1
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
        reservations:
          memory: 128M
          cpus: '0.25'
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
      redis-cache:
        condition: service_healthy
      redis-queue:
        condition: service_healthy
    restart: unless-stopped
