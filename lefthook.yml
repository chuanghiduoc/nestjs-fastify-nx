# Show full hook stdout/stderr so rejected commits surface the real error.
output:
  - meta
  - summary
  - success
  - failure
  - execution
  - execution_out
  - execution_info
  - skips

pre-commit:
  # Run serially so lint-staged finishes auto-fixing files before nx-affected
  # reads them — otherwise tsc/eslint can race the prettier writeback.
  commands:
    lint-staged:
      priority: 1
      run: pnpm lint-staged
      glob: '*.{ts,json,yml}'
    # Secret scan staged hunks only — pre-push catches the full diff. Skips
    # silently if Docker isn't available so contributors without it aren't
    # blocked locally; CI still gates.
    gitleaks:
      priority: 2
      run: bash scripts/security/scan-secrets.sh --staged
      skip:
        - merge
        - rebase
    # Mirror the gate CI applies (`nx affected -t typecheck lint build`) so a
    # broken commit is rejected locally instead of failing the PR build.
    # `--uncommitted` scopes to staged + working-tree changes; cache hits keep
    # repeat commits cheap. Skips when only docs/yaml/sh files changed.
    nx-affected:
      priority: 3
      glob: '*.{ts,tsx,json,js,cjs,mjs}'
      # --output-style=stream prints per-task output inline instead of nx's
      # collapsed summary boxes, so failures show the actual error.
      run: pnpm nx affected -t typecheck lint build --uncommitted --parallel=3 --output-style=stream
      skip:
        - merge
        - rebase

pre-push:
  commands:
    # Full repo + history scan — last line of defence before remote sees commits.
    gitleaks-full:
      run: bash scripts/security/scan-secrets.sh full

commit-msg:
  commands:
    commitlint:
      run: pnpm commitlint --edit {1}
