# Show full hook stdout/stderr so rejected commits surface the real error.
output:
  - meta
  - summary
  - success
  - failure
  - execution
  - execution_out
  - execution_info
  - skips

pre-commit:
  # Run serially so lint-staged finishes auto-fixing files before typecheck
  # reads them — otherwise tsc can race the prettier writeback.
  parallel: false
  commands:
    # Lint + format staged files only (eslint --fix + prettier). Fast: touches
    # just what you're committing.
    lint-staged:
      priority: 1
      run: pnpm lint-staged
    # Typecheck affected projects. --uncommitted scopes to your working-tree
    # changes and cache hits keep repeat commits cheap; glob skips it entirely
    # when the commit has no TS. --output-style=stream prints the real tsc error.
    typecheck:
      priority: 2
      glob: '*.{ts,tsx}'
      run: pnpm nx affected -t typecheck --uncommitted --parallel=3 --output-style=stream
      skip:
        - merge
        - rebase

commit-msg:
  commands:
    # Enforce Conventional Commits (lowercase subject, valid type). Very cheap.
    commitlint:
      run: pnpm commitlint --edit {1}

pre-push:
  commands:
    # Secret scan the full history before the remote sees it — the one gate that
    # must not reach a public remote. Skips silently without Docker; CI re-checks.
    gitleaks-full:
      run: bash scripts/security/scan-secrets.sh full
